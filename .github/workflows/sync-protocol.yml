# Auto-syncs Photon protocol constants from the upstream C# project.
#
# Strategy (per project decision):
#   - Enum code changes (EventCodes/OperationCodes): regenerated and AUTO-MERGED.
#     These are positional enums; a regenerate fully reproduces shifted codes,
#     so they are safe to apply without review.
#   - Handler-logic changes (field layouts in Network/Events + Network/Handler):
#     detected and surfaced as a PR / issue for HUMAN REVIEW, because field
#     meanings can change in ways the codegen cannot capture.
#
# This does NOT reverse-engineer new protocol codes itself; it trusts the
# upstream maintainer's reverse-engineering. A game patch that upstream has not
# yet addressed will not be fixed here until upstream updates.

name: sync-protocol

on:
  schedule:
    # Daily at 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Upstream git ref (branch or tag) to sync from"
        required: false
        default: "main"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-protocol
  cancel-in-progress: false

jobs:
  sync-codes:
    name: Sync enum codes (auto-merge)
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Regenerate protocol constants from upstream
        run: go run ./tools/codegen -ref "${{ github.event.inputs.ref || 'main' }}"

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- internal/protocol; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No protocol code changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Protocol codes changed:"
            git --no-pager diff --stat -- internal/protocol
          fi

      - name: Verify generated code still compiles and tests pass
        if: steps.diff.outputs.changed == 'true'
        # No CGO here: the protocol package and its tests are pure Go. We test
        # only the packages that do not require libpcap so the runner stays clean.
        run: |
          go build ./internal/protocol/... ./internal/photon/... ./internal/loot/... ./tools/...
          go test ./internal/protocol/... ./internal/photon/... ./internal/loot/...

      - name: Commit and push (auto-merge to main)
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add internal/protocol
          git commit \
            -m "chore(protocol): sync event/operation codes from upstream" \
            -m "Auto-generated by sync-protocol workflow from Triky313/AlbionOnline-StatisticsAnalysis. Positional enum codes only; handler logic is reviewed separately."
          git push origin HEAD:${{ github.ref_name }}

  detect-handler-changes:
    name: Detect handler-logic changes (review required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream handler + event sources and hash them
        id: hash
        run: |
          set -euo pipefail
          REF="${{ github.event.inputs.ref || 'main' }}"
          BASE="https://raw.githubusercontent.com/Triky313/AlbionOnline-StatisticsAnalysis/${REF}"

          # The loot-relevant upstream sources whose *logic* we mirror by hand.
          # If these change, a human should review whether our Go handlers need
          # updating (field layouts, new params, etc.).
          FILES=(
            "src/StatisticsAnalysisTool/Network/Events/GrabbedLootEvent.cs"
            "src/StatisticsAnalysisTool/Network/Handler/OtherGrabbedLootEventHandler.cs"
            "src/StatisticsAnalysisTool/Network/Handler/TakeSilverEventHandler.cs"
            "src/StatisticsAnalysisTool/Network/Handler/NewLootEventHandler.cs"
            "src/StatisticsAnalysisTool/Network/Handler/NewLootChestEventHandler.cs"
            "src/StatisticsAnalysisTool/Network/Handler/UpdateLootChestEventHandler.cs"
            "src/StatisticsAnalysisTool/Network/PacketProviders/LibpcapPacketProvider.cs"
          )

          mkdir -p .upstream-cache
          : > .upstream-cache/handler-hashes.txt
          for f in "${FILES[@]}"; do
            if curl -fsSL "${BASE}/${f}" -o /tmp/upstream-file 2>/dev/null; then
              h=$(sha256sum /tmp/upstream-file | cut -d' ' -f1)
              echo "${h}  ${f}" >> .upstream-cache/handler-hashes.txt
            else
              echo "MISSING  ${f}" >> .upstream-cache/handler-hashes.txt
            fi
          done
          sort -o .upstream-cache/handler-hashes.txt .upstream-cache/handler-hashes.txt
          cat .upstream-cache/handler-hashes.txt

      - name: Compare against last-known hashes
        id: compare
        run: |
          set -euo pipefail
          STORE=".github/upstream-handler-hashes.txt"
          if [ ! -f "$STORE" ]; then
            echo "No baseline yet; establishing one."
            cp .upstream-cache/handler-hashes.txt "$STORE"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "first_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if diff -u "$STORE" .upstream-cache/handler-hashes.txt > /tmp/handler-diff.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No handler-logic changes upstream."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "first_run=false" >> "$GITHUB_OUTPUT"
            echo "Handler-logic sources changed upstream:"
            cat /tmp/handler-diff.txt
            cp .upstream-cache/handler-hashes.txt "$STORE"
          fi

      - name: Open PR with updated baseline + review checklist
        if: steps.compare.outputs.changed == 'true' && steps.compare.outputs.first_run != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: upstream-handler-review
          title: "review: upstream loot handler logic changed"
          commit-message: "chore: upstream handler hashes changed; review loot parsing"
          body: |
            The upstream loot-handling source files changed. The enum codes are
            synced automatically, but **field layouts / parsing logic are not** —
            please review whether the Go handlers in `internal/loot` and the
            capture layer in `internal/capture` need updates.

            Files watched:
            - `GrabbedLootEvent.cs` (OtherGrabbedLoot field layout)
            - `OtherGrabbedLootEventHandler.cs`
            - `TakeSilverEventHandler.cs`
            - `NewLootEventHandler.cs`
            - `NewLootChestEventHandler.cs`
            - `UpdateLootChestEventHandler.cs`
            - `LibpcapPacketProvider.cs` (BPF filter / Photon ports / heuristic)

            Review checklist:
            - [ ] Field indices in `internal/loot/controller.go` still match upstream
            - [ ] BPF filter / Photon ports in `internal/capture/capture.go` still match
            - [ ] Any new loot-relevant events to handle?
          add-paths: |
            .github/upstream-handler-hashes.txt

      - name: Commit baseline on first run
        if: steps.compare.outputs.first_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/upstream-handler-hashes.txt
          git commit -m "chore: establish upstream handler-hash baseline"
          git push origin HEAD:${{ github.ref_name }}
